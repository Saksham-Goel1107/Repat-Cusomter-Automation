version: "3.9"

services:
  repeat-customer-analysis:
    build: .
    container_name: repeat-customer-analysis
    restart: unless-stopped

    # ── Environment variables ────────────────────────────────────────────────
    env_file:
      - .env

    # ── Volumes ─────────────────────────────────────────────────────────────
    # Mounts the service account key inside the container
    volumes:
      - ./service.json:/secrets/service.json:ro
      - ./logs:/app/logs

    # ── Healthcheck ─────────────────────────────────────────────────────────
    # Verifies the cron daemon process is running inside the container
    healthcheck:
      test: ["CMD-SHELL", "pgrep cron > /dev/null || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
